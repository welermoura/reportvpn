{% extends 'dashboard/base.html' %}

{% block content %}
<div id="devices-root"></div>
{% csrf_token %}

<!-- React & Dependencies -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --glass-bg: rgba(25, 28, 41, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --accent-blue: #4e73df;
        --accent-green: #1cc88a;
        --accent-orange: #f6c23e;
        --accent-red: #e74a3b;
        --text-secondary: #858796;
    }

    .premium-card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
    }

    .device-card {
        background: rgba(25, 28, 41, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
    }

    .device-card:hover {
        border-color: rgba(78, 115, 223, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(78, 115, 223, 0.2);
    }

    .device-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #4e73df, #36b9cc);
        border-radius: 12px 12px 0 0;
        transition: all 0.3s ease;
    }

    .device-card.warning::before {
        background: #f6c23e !important;
    }

    .device-card.critical::before {
        background: #e74a3b !important;
        box-shadow: 0 0 15px rgba(231, 74, 59, 0.4);
    }

    .device-card.unauthorized::before {
        background: linear-gradient(90deg, #e74a3b, #f6c23e);
    }

    .device-icon {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(78, 115, 223, 0.2), rgba(54, 185, 204, 0.1));
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
    }

    .device-icon::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        /* Linha de risco no topo mais grossa */
        background: #4e73df;
        transition: all 0.3s ease;
        z-index: 2;
    }

    .device-card.warning .device-icon {
        border-color: rgba(246, 194, 62, 0.4);
    }

    .device-card.warning .device-icon::before {
        background: #f6c23e !important;
    }

    .device-card.critical .device-icon {
        border-color: rgba(231, 74, 59, 0.4);
    }

    .device-card.critical .device-icon::before {
        background: #e74a3b !important;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
    }

    .status-dot.online {
        background: #1cc88a;
        box-shadow: 0 0 6px #1cc88a;
    }

    .status-dot.recent {
        background: #f6c23e;
        box-shadow: 0 0 6px #f6c23e;
    }

    .status-dot.offline {
        background: #858796;
    }

    .badge-pill {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 600;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(5px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .modal-box {
        background: #1a1d2d;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 28px;
        width: 750px;
        max-width: 95%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 20px;
    }

    .detail-field {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        padding: 12px 14px;
    }

    .detail-field label {
        display: block;
        font-size: 0.72rem;
        color: #858796;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }

    .detail-field span {
        font-weight: 500;
        color: #d1d3e2;
        font-size: 0.95rem;
    }

    .log-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }

    .log-bar-label {
        width: 100px;
        font-size: 0.8rem;
        color: #858796;
        text-align: right;
    }

    .log-bar-track {
        flex: 1;
        height: 6px;
        background: rgba(255, 255, 255, 0.07);
        border-radius: 3px;
        overflow: hidden;
    }

    .log-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.6s ease;
    }

    .log-bar-count {
        min-width: 40px;
        font-size: 0.8rem;
        color: #858796;
        text-align: right;
    }

    .pulse-live {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #1cc88a;
        margin-right: 6px;
        display: inline-block;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
            transform: scale(1)
        }

        50% {
            opacity: 0.5;
            transform: scale(1.3)
        }
    }

    .search-box {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 10px 16px;
        border-radius: 10px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        outline: none;
        width: 320px;
        transition: all 0.3s ease;
    }

    .search-box:focus {
        border-color: #4e73df;
        background: rgba(15, 23, 42, 0.8);
        box-shadow: 0 0 0 4px rgba(78, 115, 223, 0.15);
    }

    .filter-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #858796;
        padding: 8px 16px;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .filter-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .filter-btn.active {
        background: rgba(78, 115, 223, 0.15);
        border-color: #4e73df;
        color: #4e73df;
    }

    .filter-btn.active.warning {
        background: rgba(246, 194, 62, 0.15);
        border-color: #f6c23e;
        color: #f6c23e;
    }

    .filter-btn.active.critical {
        background: rgba(231, 74, 59, 0.15);
        border-color: #e74a3b;
        color: #e74a3b;
    }
</style>

<script type="text/babel">
    {% verbatim %}
    const { useState, useEffect, useCallback, useRef } = React;
    const { createRoot } = ReactDOM;

    const LOG_TYPES = [
        { key: 'vpn', label: 'VPN', color: '#4e73df' },
        { key: 'ips', label: 'IPS', color: '#e74a3b' },
        { key: 'antivirus', label: 'Antivírus', color: '#f6c23e' },
        { key: 'webfilter', label: 'Web Filter', color: '#36b9cc' },
        { key: 'appcontrol', label: 'App Control', color: '#f97316' },
    ];

    function relativeTime(ts) {
        if (!ts) return 'N/A';
        const diff = (Date.now() - new Date(ts).getTime()) / 1000;
        if (diff < 60) return 'agora mesmo';
        if (diff < 3600) return `${Math.floor(diff / 60)}min atrás`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h atrás`;
        return `${Math.floor(diff / 86400)}d atrás`;
    }

    function statusInfo(lastSeen) {
        if (!lastSeen) return { cls: 'offline', label: 'Inativo' };
        const diff = (Date.now() - new Date(lastSeen).getTime()) / 1000;
        if (diff < 300) return { cls: 'online', label: 'Ativo' };
        if (diff < 3600) return { cls: 'recent', label: 'Recente' };
        return { cls: 'offline', label: 'Inativo' };
    }

    // ── Modal ───────────────────────────────────────────────────────────────
    const DeviceModal = ({ device, onClose, onDeviceUpdate }) => {
        if (!device) return null;

        const [editPorts, setEditPorts] = useState(false);
        const [ports, setPorts] = useState(device.monitored_ports || []);
        const [newPortName, setNewPortName] = useState('');
        const [newPortAlias, setNewPortAlias] = useState('');
        const [saving, setSaving] = useState(false);

        const handleAddPort = () => {
            if (!newPortName.trim()) return;
            setPorts([...ports, { name: newPortName.trim(), alias: newPortAlias.trim() }]);
            setNewPortName('');
            setNewPortAlias('');
        };

        const handleRemovePort = (idx) => {
            setPorts(ports.filter((_, i) => i !== idx));
        };

        const handleSavePorts = async () => {
            setSaving(true);
            try {
                // Obter o CSRF Token
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';

                const res = await fetch(`/security/devices/api/${device.id}/ports/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ monitored_ports: ports })
                });

                if (res.ok) {
                    const data = await res.json();
                    if (onDeviceUpdate) {
                        onDeviceUpdate({ ...device, monitored_ports: data.monitored_ports });
                    }
                    setEditPorts(false);
                } else {
                    alert('Erro ao salvar as portas monitoradas.');
                }
            } catch (e) {
                console.error('Erro ao salvar portas', e);
                alert('Erro de comunicação.');
            } finally {
                setSaving(false);
            }
        };

        const st = statusInfo(device.last_seen);
        const totalLogs = LOG_TYPES.reduce((s, t) => s + (device.log_counts?.[t.key] || 0), 0);

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-box" onClick={e => e.stopPropagation()}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '20px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                            <div className="device-icon" style={{ width: 56, height: 56, marginBottom: 0, background: device.is_authorized ? 'linear-gradient(135deg,rgba(78,115,223,0.25),rgba(54,185,204,0.12))' : 'linear-gradient(135deg,rgba(231,74,59,0.25),rgba(246,194,62,0.12))', border: `1px solid ${device.is_authorized ? 'rgba(78,115,223,0.4)' : 'rgba(231,74,59,0.4)'}` }}>
                                <i className={`fa-solid ${device.is_authorized ? 'fa-shield-halved' : 'fa-triangle-exclamation'}`} style={{ fontSize: '1.5rem', color: device.is_authorized ? '#4e73df' : '#e74a3b' }}></i>
                            </div>
                            <div>
                                <div style={{ fontSize: '1.25rem', fontWeight: 700, color: 'white' }}>
                                    {device.hostname || device.device_id}
                                </div>
                                <div style={{ fontSize: '0.85rem', color: '#858796', marginTop: 2 }}>
                                    <span className={`status-dot ${st.cls}`}></span>
                                    {st.label} · {relativeTime(device.last_seen)}
                                </div>
                            </div>
                        </div>

                        {/* Alerta de Sistema */}
                        {device.alert_message && (
                            <div style={{
                                background: 'rgba(231,74,59,0.12)',
                                border: '1px solid rgba(231,74,59,0.3)',
                                borderRadius: '8px',
                                padding: '12px 16px',
                                margin: '20px 0',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '14px'
                            }}>
                                <i className="fa-solid fa-triangle-exclamation" style={{ color: '#e74a3b', fontSize: '1.2rem' }}></i>
                                <div>
                                    <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#e74a3b', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 2 }}>Alerta de Sistema</div>
                                    <div style={{ fontSize: '0.9rem', color: 'white', fontWeight: 500 }}>{device.alert_message}</div>
                                    <div style={{ fontSize: '0.72rem', color: '#858796', marginTop: 4 }}>Detectado em: {new Date(device.alert_time).toLocaleString('pt-BR')}</div>
                                </div>
                            </div>
                        )}
                        <button onClick={onClose} style={{
                            background: 'rgba(255,255,255,0.07)', border: '1px solid rgba(255,255,255,0.1)',
                            color: '#858796', borderRadius: '8px', padding: '6px 12px', cursor: 'pointer', fontSize: '1rem'
                        }}>✕</button>
                    </div>

                    {/* Monitoramento Detalhado de Hardware */}
                    <div style={{ marginTop: 24 }}>
                        <div style={{ fontSize: '0.8rem', color: '#858796', textTransform: 'uppercase', marginBottom: 12, fontWeight: 600, letterSpacing: '0.5px' }}>
                            Saúde do Sistema (Monitorado)
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px' }}>
                            {[
                                { label: 'CPU', value: device.hw_status?.cpu || 'normal', icon: 'fa-microchip' },
                                { label: 'Memória', value: device.hw_status?.memory || 'normal', icon: 'fa-memory' },
                                { label: 'Links', value: device.hw_status?.link || 'normal', icon: 'fa-network-wired' },
                                { label: 'Conserve', value: device.hw_status?.conserve ? 'ATIVO' : 'Inativo', icon: 'fa-snowflake' }
                            ].map((item, idx) => {
                                const isBad = item.value.toLowerCase() !== 'normal' && item.value.toLowerCase() !== 'inativo';
                                return (
                                    <div key={idx} style={{
                                        background: isBad ? 'rgba(231,74,59,0.08)' : 'rgba(255,255,255,0.03)',
                                        border: `1px solid ${isBad ? 'rgba(231,74,59,0.3)' : 'rgba(255,255,255,0.06)'}`,
                                        borderRadius: '8px',
                                        padding: '12px',
                                        textAlign: 'center'
                                    }}>
                                        <i className={`fa-solid ${item.icon}`} style={{ color: isBad ? '#e74a3b' : '#1cc88a', fontSize: '1.2rem', marginBottom: 8 }}></i>
                                        <div style={{ fontSize: '0.7rem', color: '#858796', textTransform: 'uppercase', marginBottom: 2 }}>{item.label}</div>
                                        <div style={{ fontSize: '0.85rem', fontWeight: 700, color: isBad ? '#e74a3b' : 'white' }}>{item.value.toUpperCase()}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '14px', marginTop: '24px' }}>
                        <div className="detail-field">
                            <label>Serial / Device ID</label>
                            <span style={{ fontFamily: 'monospace', color: '#60a5fa' }}>{device.device_id}</span>
                        </div>
                        <div className="detail-field">
                            <label>Hostname</label>
                            <span>{device.hostname || '—'}</span>
                        </div>
                        <div className="detail-field">
                            <label>Último IP de Origem</label>
                            <span style={{ fontFamily: 'monospace' }}>{device.ip_address}</span>
                        </div>
                        <div className="detail-field">
                            <label>Tipo de Dispositivo</label>
                            <span style={{ textTransform: 'capitalize' }}>{device.device_type}</span>
                        </div>
                        <div className="detail-field">
                            <label>Último Log Recebido</label>
                            <span>{device.last_seen ? new Date(device.last_seen).toLocaleString('pt-BR') : '—'}</span>
                        </div>
                        <div className="detail-field">
                            <label>Status</label>
                            <span className={`badge-pill`} style={{
                                background: device.is_authorized ? 'rgba(28,200,138,0.15)' : 'rgba(231,74,59,0.15)',
                                color: device.is_authorized ? '#1cc88a' : '#e74a3b',
                                border: `1px solid ${device.is_authorized ? '#1cc88a44' : '#e74a3b44'}`
                            }}>
                                {device.is_authorized ? '✓ Autorizado' : '✗ Não Autorizado'}
                            </span>
                        </div>
                    </div>

                    {/* Volume de logs por tipo */}
                    <div style={{ marginTop: 24 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                            <div style={{ fontSize: '0.8rem', color: '#858796', textTransform: 'uppercase', fontWeight: 600, letterSpacing: '0.5px' }}>
                                Volume de Logs Recebidos (últimas 24h)
                            </div>
                            <button onClick={() => setEditPorts(!editPorts)} style={{
                                background: editPorts ? 'rgba(78,115,223,0.2)' : 'rgba(255,255,255,0.05)',
                                color: editPorts ? '#4e73df' : '#858796',
                                border: '1px solid rgba(255,255,255,0.1)',
                                padding: '4px 10px',
                                borderRadius: '6px',
                                fontSize: '0.8rem',
                                cursor: 'pointer',
                                display: 'flex',
                                alignItems: 'center',
                                gap: '6px'
                            }}>
                                <i className="fa-solid fa-gear"></i> Configurar Portas (Health)
                            </button>
                        </div>

                        {editPorts ? (
                            <div style={{ background: 'rgba(0,0,0,0.2)', padding: '16px', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.05)' }}>
                                <div style={{ fontSize: '0.85rem', color: '#d1d3e2', marginBottom: '12px' }}>
                                    Adicione as portas / SLAs que devem acionar o alarme de Saúde de Link neste dispositivo. Se vazio, monitora todas.
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr auto', gap: '10px', marginBottom: '16px' }}>
                                    <input
                                        type="text"
                                        placeholder="Nome Real (ex: wan1)"
                                        className="search-box"
                                        style={{ width: '100%', padding: '8px 12px', fontSize: '0.85rem' }}
                                        value={newPortName}
                                        onChange={e => setNewPortName(e.target.value)}
                                    />
                                    <input
                                        type="text"
                                        placeholder="Alias (ex: Link Principal)"
                                        className="search-box"
                                        style={{ width: '100%', padding: '8px 12px', fontSize: '0.85rem' }}
                                        value={newPortAlias}
                                        onChange={e => setNewPortAlias(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleAddPort()}
                                    />
                                    <button onClick={handleAddPort} style={{ background: '#4e73df', color: 'white', border: 'none', borderRadius: '8px', padding: '0 16px', cursor: 'pointer', fontWeight: 600 }}>
                                        Adicionar
                                    </button>
                                </div>

                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '16px' }}>
                                    {ports.length === 0 ? (
                                        <span style={{ fontSize: '0.8rem', color: '#858796', fontStyle: 'italic' }}>Nenhuma porta específica. Monitorando tudo.</span>
                                    ) : (
                                        ports.map((p, idx) => (
                                            <div key={idx} style={{ background: 'rgba(78,115,223,0.15)', border: '1px solid rgba(78,115,223,0.3)', padding: '4px 10px', borderRadius: '16px', fontSize: '0.8rem', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <span style={{ color: 'white' }}>{p.alias || p.name}</span>
                                                <span style={{ color: '#858796', fontFamily: 'monospace' }}>({p.name})</span>
                                                <i className="fa-solid fa-xmark" style={{ cursor: 'pointer', color: '#e74a3b', marginLeft: '4px' }} onClick={() => handleRemovePort(idx)}></i>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '10px' }}>
                                    <button onClick={() => setEditPorts(false)} style={{ background: 'transparent', color: '#858796', border: 'none', cursor: 'pointer', fontSize: '0.85rem' }}>Cancelar</button>
                                    <button onClick={handleSavePorts} disabled={saving} style={{ background: '#1cc88a', color: 'white', border: 'none', padding: '6px 16px', borderRadius: '6px', cursor: saving ? 'not-allowed' : 'pointer', fontWeight: 600, fontSize: '0.85rem' }}>
                                        {saving ? 'Salvando...' : 'Salvar Portas'}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <>
                                {LOG_TYPES.map(t => {
                                    const count = device.log_counts?.[t.key] || 0;
                                    const pct = totalLogs > 0 ? (count / totalLogs * 100) : 0;
                                    return (
                                        <div className="log-bar" key={t.key}>
                                            <span className="log-bar-label">{t.label}</span>
                                            <div className="log-bar-track">
                                                <div className="log-bar-fill" style={{ width: `${pct}%`, background: t.color }}></div>
                                            </div>
                                            <span className="log-bar-count">{count.toLocaleString()}</span>
                                        </div>
                                    );
                                })}
                                <div style={{ textAlign: 'right', fontSize: '0.75rem', color: '#858796', marginTop: 6 }}>
                                    Total: {totalLogs.toLocaleString()} logs em 24h
                                </div>
                            </>
                        )}
                    </div>
                </div>
            </div>
        );
    };

    // ── Dashboard principal ─────────────────────────────────────────────────
    function DevicesDashboard() {
        const [devices, setDevices] = useState([]);
        const [loading, setLoading] = useState(true);
        const [selected, setSelected] = useState(null);
        const [search, setSearch] = useState('');
        const [statusFilter, setStatusFilter] = useState('total'); // total, alert, critical, healthy

        const fetchData = useCallback(async () => {
            try {
                const res = await fetch('/security/devices/api/');
                const data = await res.json();
                setDevices(data);
            } catch (e) {
                console.error(e);
            } finally {
                setLoading(false);
            }
        }, []);

        useEffect(() => {
            fetchData();
            const t = setInterval(fetchData, 30000);
            return () => clearInterval(t);
        }, []);

        const filtered = devices.filter(d => {
            const matchesSearch = (d.hostname || '').toLowerCase().includes(search.toLowerCase()) ||
                (d.device_id || '').toLowerCase().includes(search.toLowerCase()) ||
                (d.ip_address || '').includes(search);

            if (statusFilter === 'alert') return matchesSearch && d.health_score === 1;
            if (statusFilter === 'critical') return matchesSearch && d.health_score === 2;
            if (statusFilter === 'healthy') return matchesSearch && d.health_score === 0;
            return matchesSearch;
        });

        const alertCount = devices.filter(d => d.health_score === 1).length;
        const criticalCount = devices.filter(d => d.health_score === 2).length;
        const healthyCount = devices.filter(d => d.health_score === 0).length;

        return (
            <div style={{ padding: '0', fontFamily: "'Inter', sans-serif" }}>
                {/* Cabeçalho */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px' }}>
                    <h2 style={{ fontSize: '1.4rem', color: 'white', margin: 0, display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <span>📡</span> Inventário de Dispositivos Syslog
                    </h2>
                    <div style={{ display: 'flex', alignItems: 'center', background: 'rgba(0,0,0,0.3)', padding: '6px 12px', borderRadius: '20px', border: '1px solid rgba(255,255,255,0.08)' }}>
                        <span className="pulse-live"></span>
                        <span style={{ fontSize: '0.7rem', color: '#858796', fontWeight: 600 }}>LIVE • 30s</span>
                    </div>
                </div>

                {/* KPI Cards */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '16px', marginBottom: '24px' }}>
                    {[
                        { key: 'total', label: 'Total de Devices', value: devices.length, color: '#4e73df', icon: '📡' },
                        { key: 'healthy', label: 'Saudáveis', value: healthyCount, color: '#1cc88a', icon: '🟢' },
                        { key: 'alert', label: 'Alertas', value: alertCount, color: '#f6c23e', icon: '🟡', cls: 'warning' },
                        { key: 'critical', label: 'Críticos', value: criticalCount, color: '#e74a3b', icon: '🔴', cls: 'critical' },
                    ].map((kpi, i) => (
                        <div key={i}
                            className={`premium-card filter-btn ${statusFilter === kpi.key ? 'active ' + (kpi.cls || '') : ''}`}
                            style={{ padding: '20px 24px', cursor: 'pointer', textAlign: 'left', display: 'block' }}
                            onClick={() => setStatusFilter(kpi.key)}
                        >
                            <div style={{ fontSize: '0.8rem', color: '#858796', marginBottom: 6 }}>{kpi.icon} {kpi.label}</div>
                            <div style={{ fontSize: '2rem', fontWeight: 700, color: kpi.color }}>{kpi.value}</div>
                        </div>
                    ))}
                </div>

                {/* Busca */}
                <div style={{ marginBottom: '20px' }}>
                    <input
                        className="search-box"
                        placeholder="🔍  Buscar por hostname, serial ou IP..."
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                    />
                </div>

                {/* Grid de Devices */}
                {loading ? (
                    <div style={{ textAlign: 'center', padding: '60px', color: '#858796' }}>Carregando dispositivos...</div>
                ) : filtered.length === 0 ? (
                    <div style={{ textAlign: 'center', padding: '60px', color: '#858796' }}>
                        Nenhum dispositivo {search ? 'encontrado para "' + search + '"' : 'registrado ainda. Aguardando logs do FortiGate.'}
                    </div>
                ) : (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '16px' }}>
                        {filtered.map(device => {
                            const st = statusInfo(device.last_seen);
                            const totalLogs = LOG_TYPES.reduce((s, t) => s + (device.log_counts?.[t.key] || 0), 0);
                            const hCls = device.health_score === 2 ? 'critical' : (device.health_score === 1 ? 'warning' : '');

                            return (
                                <div key={device.device_id}
                                    className={`device-card ${hCls} ${!device.is_authorized ? 'unauthorized' : ''}`}
                                    onClick={() => setSelected(device)}
                                >
                                    <div className="device-icon" style={{
                                        background: device.health_score === 2 ? 'linear-gradient(135deg,rgba(231,74,59,0.2),rgba(239,68,68,0.1))' :
                                            (device.health_score === 1 ? 'linear-gradient(135deg,rgba(246,194,62,0.2),rgba(249,115,22,0.1))' :
                                                'linear-gradient(135deg,rgba(78,115,223,0.2),rgba(54,185,204,0.1))'),
                                        border: `1px solid ${device.health_score === 2 ? 'rgba(231,74,59,0.4)' : (device.health_score === 1 ? 'rgba(246,194,62,0.4)' : 'rgba(78,115,223,0.3)')}`
                                    }}>
                                        <i className={`fa-solid ${device.health_score === 2 ? 'fa-biohazard' : (device.health_score === 1 ? 'fa-triangle-exclamation' : (device.is_authorized ? 'fa-shield-halved' : 'fa-triangle-exclamation'))}`}
                                            style={{ fontSize: '1.3rem', color: device.health_score === 2 ? '#e74a3b' : (device.health_score === 1 ? '#f6c23e' : '#4e73df') }}>
                                        </i>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <div style={{ fontWeight: 700, fontSize: '1rem', color: 'white', marginBottom: 4 }}>
                                            {device.hostname || device.device_id}
                                        </div>
                                        {device.alert_message && (
                                            <div title={device.alert_message} style={{ color: '#e74a3b', fontSize: '0.9rem', animation: 'pulse 1.5s infinite' }}>
                                                <i className="fa-solid fa-triangle-exclamation"></i>
                                            </div>
                                        )}
                                    </div>
                                    <div style={{ fontSize: '0.78rem', color: '#858796', fontFamily: 'monospace', marginBottom: 4 }}>
                                        {device.device_id}
                                    </div>

                                    {/* Monitored Ports Summary */}
                                    <div style={{ fontSize: '0.72rem', color: '#4e73df', marginBottom: 12, minHeight: '14px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                        {device.monitored_ports && device.monitored_ports.length > 0 ? (
                                            <>
                                                <i className="fa-solid fa-filter" style={{ marginRight: '4px' }}></i>
                                                Health: {device.monitored_ports.map(p => p.alias || p.name).join(', ')}
                                            </>
                                        ) : (
                                            <span style={{ color: '#858796' }}><i className="fa-solid fa-globe" style={{ marginRight: '4px' }}></i> Health: Todas Portas</span>
                                        )}
                                    </div>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                        <div style={{ fontSize: '0.82rem', color: '#d1d3e2' }}>
                                            <span style={{ color: '#858796' }}>IP: </span>
                                            <span style={{ fontFamily: 'monospace' }}>{device.ip_address}</span>
                                        </div>
                                        <span className={`badge-pill`} style={{
                                            background: st.cls === 'online' ? 'rgba(28,200,138,0.15)' : st.cls === 'recent' ? 'rgba(246,194,62,0.15)' : 'rgba(133,135,150,0.15)',
                                            color: st.cls === 'online' ? '#1cc88a' : st.cls === 'recent' ? '#f6c23e' : '#858796',
                                            border: `1px solid ${st.cls === 'online' ? '#1cc88a44' : st.cls === 'recent' ? '#f6c23e44' : '#85879644'}`,
                                        }}>
                                            <span className={`status-dot ${st.cls}`}></span>
                                            {st.label}
                                        </span>
                                    </div>

                                    {/* Mini barras de tipo de log */}
                                    <div style={{ display: 'flex', gap: '4px', height: '4px', borderRadius: '2px', overflow: 'hidden', marginBottom: 10 }}>
                                        {LOG_TYPES.map(t => {
                                            const count = device.log_counts?.[t.key] || 0;
                                            const pct = totalLogs > 0 ? (count / totalLogs * 100) : 0;
                                            return <div key={t.key} style={{ width: `${pct}%`, background: t.color, minWidth: count > 0 ? '4px' : '0' }}></div>;
                                        })}
                                    </div>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: '#858796' }}>
                                        <span>🕒 {relativeTime(device.last_seen)}</span>
                                        <span>{totalLogs.toLocaleString()} logs/24h</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}

                {selected && <DeviceModal device={selected} onClose={() => setSelected(null)} onDeviceUpdate={(updatedDevice) => {
                    setDevices(devs => devs.map(d => d.id === updatedDevice.id ? { ...d, monitored_ports: updatedDevice.monitored_ports } : d));
                    setSelected(prev => ({ ...prev, monitored_ports: updatedDevice.monitored_ports }));
                }} />}
            </div>
        );
    }

    const root = createRoot(document.getElementById('devices-root'));
    root.render(<DevicesDashboard />);
    {% endverbatim %}
</script>
{% endblock %}
