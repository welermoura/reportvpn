{% extends 'dashboard/base.html' %}

{% block content %}
<div id="appcontrol-dashboard-root"></div>

<!-- React & Dependencies -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<!-- Custom Styles for Premium Look -->
<style>
    :root {
        --glass-bg: rgba(25, 28, 41, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --accent-blue: #4e73df;
        --accent-green: #1cc88a;
        --text-secondary: #858796;
    }

    .premium-card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
    }

    .stat-value-premium {
        font-size: 1.8rem;
        font-weight: 700;
        color: white;
    }

    .stat-label {
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 8px;
    }

    .chart-box {
        background: var(--glass-bg);
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        padding: 20px;
        height: 300px;
    }

    .chart-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: white;
        margin-bottom: 20px;
    }

    .table-premium {
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        font-weight: 400;
        color: rgb(248, 250, 252);
        border-collapse: collapse;
    }

    .table-premium th {
        color: var(--text-secondary);
        font-weight: 600;
        padding: 12px 8px;
        border-bottom: 1px solid var(--glass-border);
        text-align: left;
        white-space: nowrap;
    }

    .table-premium td {
        padding: 12px 8px;
        color: #d1d3e2;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .table-premium tr:hover {
        background: rgba(255, 255, 255, 0.03);
    }

    .user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: #4e73df;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: white;
        margin-right: 8px;
        font-size: 0.7rem;
    }

    .pulse-live {
        width: 8px;
        height: 8px;
        background: #1cc88a;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        box-shadow: 0 0 0 rgba(28, 200, 138, 0.4);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(28, 200, 138, 0.7);
        }

        70% {
            transform: scale(1.1);
            box-shadow: 0 0 0 10px rgba(28, 200, 138, 0);
        }

        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(28, 200, 138, 0);
        }
    }

    .filters-bar {
        background: transparent;
        padding: 10px 0;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
    }

    .filters-label {
        font-weight: bold;
        color: #fff;
        margin-right: 10px;
        text-transform: uppercase;
        font-size: 0.9rem;
    }

    .filter-input {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 6px 12px;
        border-radius: 4px;
        min-width: 150px;
        font-family: 'Inter', sans-serif;
    }

    .filter-input:focus {
        border-color: #4e73df;
        outline: none;
    }

    .btn-sm {
        padding: 6px 12px;
        font-size: 0.85rem;
    }

    .btn-secondary {
        background-color: #858796;
        border-color: #858796;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid transparent;
    }
</style>

<script type="text/babel">
    {% verbatim %}
    const { useState, useEffect, useCallback, useRef } = React;
    const { createRoot } = ReactDOM;

    // --- Components ---

    const StatsCharts = ({ stats, onFilterChange }) => {
        const appsRef = useRef(null);
        const catRef = useRef(null);
        const userRef = useRef(null);
        const chartInstances = useRef({});

        useEffect(() => {
            if (!stats) return;
            Object.values(chartInstances.current).forEach(c => c.destroy());

            const chartOptions = {
                responsive: true, maintainAspectRatio: false,
                indexAxis: 'y',
                onHover: (e, elements) => {
                    e.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default';
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(15, 23, 42, 0.9)', titleColor: '#f8fafc',
                        bodyColor: '#cbd5e1', borderColor: 'rgba(255, 255, 255, 0.1)', borderWidth: 1,
                    }
                },
                scales: {
                    y: { ticks: { color: '#858796', font: { family: 'Inter' } }, grid: { display: false } },
                    x: { ticks: { color: '#858796', font: { family: 'Inter' } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                }
            };

            // Top Apps Chart
            if (stats.top_apps) {
                chartInstances.current.apps = new Chart(appsRef.current, {
                    type: 'bar',
                    data: {
                        labels: stats.top_apps.map(item => item.app_name),
                        datasets: [{
                            label: 'Acessos',
                            data: stats.top_apps.map(item => item.count),
                            backgroundColor: 'rgba(54, 185, 204, 0.8)',
                            borderRadius: 4, barThickness: 15
                        }]
                    },
                    options: {
                        ...chartOptions,
                        onClick: (event, elements) => {
                            if (elements.length > 0 && onFilterChange) {
                                const index = elements[0].index;
                                const value = stats.top_apps[index].app_name;
                                onFilterChange('app_name', value);
                            }
                        }
                    }
                });
            }

            // Categories Chart
            if (stats.top_categories) {
                chartInstances.current.categories = new Chart(catRef.current, {
                    type: 'bar',
                    data: {
                        labels: stats.top_categories.map(item => item.app_category),
                        datasets: [{
                            label: 'Acessos',
                            data: stats.top_categories.map(item => item.count),
                            backgroundColor: 'rgba(246, 194, 62, 0.8)',
                            borderRadius: 4, barThickness: 15
                        }]
                    },
                    options: {
                        ...chartOptions,
                        onClick: (event, elements) => {
                            if (elements.length > 0 && onFilterChange) {
                                const index = elements[0].index;
                                const value = stats.top_categories[index].app_category;
                                onFilterChange('app_category', value);
                            }
                        }
                    }
                });
            }

            // Users Chart
            if (stats.top_users) {
                chartInstances.current.users = new Chart(userRef.current, {
                    type: 'bar',
                    data: {
                        labels: stats.top_users.map(item => item.username),
                        datasets: [{
                            label: 'Acessos',
                            data: stats.top_users.map(item => item.count),
                            backgroundColor: 'rgba(78, 115, 223, 0.8)',
                            borderRadius: 4, barThickness: 15
                        }]
                    },
                    options: {
                        ...chartOptions,
                        onClick: (event, elements) => {
                            if (elements.length > 0 && onFilterChange) {
                                const index = elements[0].index;
                                const value = stats.top_users[index].username;
                                onFilterChange('username', value);
                            }
                        }
                    }
                });
            }

            return () => Object.values(chartInstances.current).forEach(c => c.destroy());
        }, [stats]);

        return (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(350px, 1fr))', gap: '20px', marginBottom: '30px' }}>
                <div className="chart-box" style={{ height: '350px' }}>
                    <div className="chart-title">Top 10 Aplicações</div>
                    <div style={{ height: '290px' }}><canvas ref={appsRef}></canvas></div>
                </div>
                <div className="chart-box" style={{ height: '350px' }}>
                    <div className="chart-title">Top 10 Usuários</div>
                    <div style={{ height: '290px' }}><canvas ref={userRef}></canvas></div>
                </div>
                <div className="chart-box" style={{ height: '350px' }}>
                    <div className="chart-title">Categorias de Aplicação</div>
                    <div style={{ height: '290px' }}><canvas ref={catRef}></canvas></div>
                </div>
            </div>
        );
    };

    const AppControlDetailsModal = ({ event, onClose }) => {
        if (!event) return null;

        const formatTime = (ts) => new Date(ts).toLocaleString('pt-BR');
        const displayName = event.ad_display_name || event.username || 'Desconhecido';
        const displaySub = event.username || event.src_ip || 'N/A';
        const initials = displayName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

        const formatBytes = (bytes) => {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(5px)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000
            }} onClick={onClose}>
                <div style={{
                    background: '#1a1d2d', border: '1px solid rgba(255,255,255,0.1)',
                    borderRadius: '12px', padding: '24px', width: '900px', maxWidth: '95%', maxHeight: '90vh',
                    overflowY: 'auto', boxShadow: '0 20px 50px rgba(0,0,0,0.5)', position: 'relative'
                }} onClick={e => e.stopPropagation()}>
                    <button onClick={onClose} style={{
                        position: 'absolute', top: '15px', right: '15px',
                        background: 'transparent', border: 'none', color: '#fff', fontSize: '1.2rem', cursor: 'pointer'
                    }}>✕</button>

                    <h3 style={{ color: 'white', marginTop: 0, borderBottom: '1px solid rgba(255,255,255,0.1)', paddingBottom: '12px' }}>
                        Detalhes do Controle de Aplicação
                    </h3>

                    {/* Identity Card */}
                    <div style={{ background: 'rgba(255, 255, 255, 0.03)', padding: '20px', borderRadius: '8px', marginBottom: '25px', display: 'flex', alignItems: 'center', gap: '20px' }}>
                        <div style={{ background: '#4e73df', width: '60px', height: '60px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2rem', color: 'white' }}>
                            {initials}
                        </div>
                        <div>
                            <div style={{ color: 'white', fontWeight: 700, fontSize: '1.3rem' }}>
                                {displayName}
                            </div>
                            <div style={{ display: 'flex', gap: '20px', marginTop: '8px', fontSize: '0.9rem', color: '#d1d3e2' }}>
                                <span>👤 {displaySub}</span>
                                {event.user_department && <span>🏢 {event.user_department}</span>}
                                {event.ad_title && <span>💼 {event.ad_title}</span>}
                            </div>
                        </div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                            <div>
                                <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Data e Hora</label>
                                <div style={{ fontSize: '0.95rem', color: '#d1d3e2' }}><i className="far fa-clock me-2"></i>{formatTime(event.timestamp)}</div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                                <div>
                                    <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Aplicação</label>
                                    <span style={{
                                        padding: '4px 8px', borderRadius: '4px', fontSize: '0.85rem', fontWeight: 600,
                                        background: 'rgba(54, 185, 204, 0.2)', color: '#36b9cc'
                                    }}>{event.app_name || 'Desconhecido'}</span>
                                </div>
                                <div>
                                    <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Categoria</label>
                                    <span style={{
                                        padding: '4px 8px', borderRadius: '4px', fontSize: '0.85rem', fontWeight: 600,
                                        background: 'rgba(246, 194, 62, 0.2)', color: '#f6c23e'
                                    }}>{event.app_category || '-'}</span>
                                </div>
                                {event.app_risk && (
                                    <div>
                                        <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Risco</label>
                                        <span style={{
                                            padding: '4px 8px', borderRadius: '4px', fontSize: '0.85rem', fontWeight: 600,
                                            background: 'rgba(231, 74, 59, 0.2)', color: '#e74a3b'
                                        }}>{event.app_risk}</span>
                                    </div>
                                )}
                            </div>
                            {event.url && (
                                <div>
                                    <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>URL / Website</label>
                                    <div style={{ fontSize: '0.85rem', color: '#4e73df', wordBreak: 'break-all', textDecoration: 'underline' }}>
                                        <a href={event.url.startsWith('http') ? event.url : `http://${event.url}`} target="_blank" rel="noopener noreferrer" style={{ color: 'inherit' }}>
                                            {event.url}
                                        </a>
                                    </div>
                                </div>
                            )}
                            {(!event.url && (event.raw_data?.hostname || event.raw_data?.url)) && (
                                <div>
                                    <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>URL / Website (Raw)</label>
                                    <div style={{ fontSize: '0.85rem', color: '#4e73df', wordBreak: 'break-all', textDecoration: 'underline' }}>
                                        {event.raw_data?.hostname || event.raw_data?.url}
                                    </div>
                                </div>
                            )}
                            <div>
                                <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Ação</label>
                                <span style={{
                                    padding: '4px 8px', borderRadius: '4px', fontSize: '0.85rem', fontWeight: 600,
                                    background: event.action === 'blocked' ? 'rgba(220, 53, 69, 0.2)' : 'rgba(28, 200, 138, 0.2)',
                                    color: event.action === 'blocked' ? '#dc3545' : '#1cc88a'
                                }}>
                                    {event.action || '-'}
                                </span>
                            </div>
                        </div>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                            <div>
                                <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Rede & Endpoint</label>
                                <div style={{ fontSize: '0.9rem', color: '#d1d3e2' }}>
                                    <div><span style={{ color: '#858796' }}>Origem:</span> {event.src_ip} {event.src_country && `(${event.src_country})`}</div>
                                    <div><span style={{ color: '#858796' }}>Destino:</span> {event.dst_ip || '-'} {event.dst_country && `(${event.dst_country})`}</div>
                                </div>
                            </div>

                            <div>
                                <label style={{ display: 'block', color: '#858796', fontSize: '0.75rem', textTransform: 'uppercase', marginBottom: '4px' }}>Uso de Banda (Estimado)</label>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', fontSize: '0.9rem', color: '#d1d3e2' }}>
                                    <div style={{ background: 'rgba(255, 255, 255, 0.03)', padding: '8px', borderRadius: '4px' }}>
                                        <div style={{ color: '#858796', fontSize: '0.75rem' }}>Recebido (Bytes In)</div>
                                        <div>{formatBytes(event.bytes_in)}</div>
                                    </div>
                                    <div style={{ background: 'rgba(255, 255, 255, 0.03)', padding: '8px', borderRadius: '4px' }}>
                                        <div style={{ color: '#858796', fontSize: '0.75rem' }}>Enviado (Bytes Out)</div>
                                        <div>{formatBytes(event.bytes_out)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    function AppControlDashboard() {
        const [events, setEvents] = useState([]);
        const [stats, setStats] = useState(null);
        const [loading, setLoading] = useState(true);
        const [page, setPage] = useState(1);
        const [totalPages, setTotalPages] = useState(1);
        const [totalCount, setTotalCount] = useState(0);
        const [showCharts, setShowCharts] = useState(true);
        const [selectedEvent, setSelectedEvent] = useState(null);

        const getTodayDate = () => {
            const today = new Date();
            return today.toISOString().split('T')[0];
        };

        const [filters, setFilters] = useState({
            username: '', app_name: '', action: '', src_ip: '',
            start_date: getTodayDate(), end_date: getTodayDate()
        });

        useEffect(() => {
            fetchData(true);
            const interval = setInterval(() => fetchData(false), 60000);
            return () => clearInterval(interval);
        }, [page, filters]);

        const fetchData = async (showLoading = true) => {
            if (showLoading) setLoading(true);
            try {
                // Remove campos vazios, mapeia src_ip se preenchido
                const activeFilters = Object.fromEntries(Object.entries(filters).filter(([_, v]) => v !== ''));
                const params = new URLSearchParams({ page: page, ...activeFilters });
                // Passa src_ip genérico para 'search' caso backend não suporte filtro exato, ou como search_fields (que pega global).
                // Como setamos search_fields=['app_name','username','src_ip'], passaremos a flag 'search' quando digita no app_name ou ip. Mas para ser específico, vamos enviar no param customizado "search" juntando os dois se quisermos.
                // Como configuramos filter_backends com SearchFilter, o param é `search`. Vamos agregar para mandar na query geral `search`.
                // Porém o mais elegante é usar o próprio get ou icontains no filterset, mas usaremos django_filters Search que atua no param "search".

                // Mapeamento local para "search" unificado:
                let searchQuery = [];
                if (filters.app_name) searchQuery.push(filters.app_name);
                if (filters.username) searchQuery.push(filters.username);
                if (filters.src_ip) searchQuery.push(filters.src_ip);

                if (searchQuery.length > 0) {
                    params.set('search', searchQuery.join(' '));
                    params.delete('app_name');
                    params.delete('username');
                    params.delete('src_ip');
                }

                const [eventsRes, statsRes] = await Promise.all([
                    fetch(`/api/security-events/app-control/?${params}`),
                    fetch(`/api/security-events/app-control/stats/?${params}`)
                ]);

                const eventsData = await eventsRes.json();
                setEvents(eventsData.results || []);
                setTotalCount(eventsData.count || 0);
                setTotalPages(Math.ceil((eventsData.count || 0) / 50) || 1);

                if (statsRes.ok) setStats(await statsRes.json());
            } catch (err) {
                console.error(err);
            } finally {
                if (showLoading) setLoading(false);
            }
        };

        const handleFilterChange = (field, value) => {
            setFilters(prev => ({ ...prev, [field]: value }));
            setPage(1);
        };

        const clearFilters = () => {
            setFilters({
                username: '', app_name: '', action: '', src_ip: '',
                start_date: getTodayDate(), end_date: getTodayDate()
            });
            setPage(1);
        };

        const handleExport = (type) => {
            if (type === 'pdf') { window.print(); return; }
            const activeFilters = Object.fromEntries(Object.entries(filters).filter(([_, v]) => v !== ''));
            const params = new URLSearchParams(activeFilters);
            window.open(`/api/security-events/app-control/?${params.toString()}&format=csv`, '_blank');
        };

        const Pagination = () => (
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 20px', borderTop: '1px solid rgba(255,255,255,0.05)', flexWrap: 'wrap', gap: '10px' }}>
                <span style={{ color: '#858796', fontSize: '0.85rem' }}>Página {page} de {totalPages} — {totalCount.toLocaleString('pt-BR')} registros</span>
                <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                    <button onClick={() => setPage(1)} disabled={page === 1} style={{ padding: '4px 8px', background: page === 1 ? 'rgba(255,255,255,0.05)' : 'rgba(78,115,223,0.2)', border: '1px solid rgba(78,115,223,0.4)', color: 'white', borderRadius: '4px', cursor: page === 1 ? 'not-allowed' : 'pointer', opacity: page === 1 ? 0.5 : 1 }}>⏮</button>
                    <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1} style={{ padding: '4px 10px', background: page === 1 ? 'rgba(255,255,255,0.05)' : 'rgba(78,115,223,0.2)', border: '1px solid rgba(78,115,223,0.4)', color: 'white', borderRadius: '4px', cursor: page === 1 ? 'not-allowed' : 'pointer', opacity: page === 1 ? 0.5 : 1 }}>◀</button>
                    <span style={{ padding: '4px 14px', background: 'rgba(78,115,223,0.3)', border: '1px solid rgba(78,115,223,0.5)', color: 'white', borderRadius: '4px', minWidth: '80px', textAlign: 'center', fontSize: '0.85rem' }}>{page} / {totalPages}</span>
                    <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages} style={{ padding: '4px 10px', background: page === totalPages ? 'rgba(255,255,255,0.05)' : 'rgba(78,115,223,0.2)', border: '1px solid rgba(78,115,223,0.4)', color: 'white', borderRadius: '4px', cursor: page === totalPages ? 'not-allowed' : 'pointer', opacity: page === totalPages ? 0.5 : 1 }}>▶</button>
                    <button onClick={() => setPage(totalPages)} disabled={page === totalPages} style={{ padding: '4px 8px', background: page === totalPages ? 'rgba(255,255,255,0.05)' : 'rgba(78,115,223,0.2)', border: '1px solid rgba(78,115,223,0.4)', color: 'white', borderRadius: '4px', cursor: page === totalPages ? 'not-allowed' : 'pointer', opacity: page === totalPages ? 0.5 : 1 }}>⏭</button>
                </div>
            </div>
        );

        return (
            <div style={{ padding: '0px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                    <h2 style={{ fontSize: '1.4rem', color: 'white', margin: 0, display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <span style={{ fontSize: '1.2rem' }}>📱</span> Controle de Aplicações Internas
                    </h2>
                    <div style={{ display: 'flex', alignItems: 'center', background: 'rgba(0,0,0,0.3)', padding: '6px 12px', borderRadius: '20px', border: '1px solid var(--glass-border)' }}>
                        <span className="pulse-live"></span>
                        <span style={{ fontSize: '0.7rem', color: '#858796', fontWeight: 600 }}>LIVE UPDATING</span>
                    </div>
                </div>

                <div className="premium-card" style={{ marginBottom: '20px', padding: '10px 20px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between' }} onClick={() => setShowCharts(!showCharts)}>
                    <span style={{ fontSize: '0.85rem', fontWeight: 600 }}>📊 Visualizar Gráficos e Estatísticas</span>
                    <span>{showCharts ? '▲' : '▼'}</span>
                </div>

                {showCharts && (
                    <React.Fragment>
                        <StatsCharts stats={stats} onFilterChange={handleFilterChange} />
                    </React.Fragment>
                )}

                <div className="premium-card" style={{ padding: '0', overflow: 'hidden', marginBottom: '20px' }}>

                    <div className="filters-bar" style={{ margin: 0, padding: '15px 20px', borderBottom: '1px solid rgba(255, 255, 255, 0.1)' }}>
                        <span className="filters-label">FILTROS:</span>

                        <input
                            type="text" className="filter-input" placeholder="Usuário..."
                            value={filters.username} onChange={(e) => handleFilterChange('username', e.target.value)}
                            style={{ width: '120px' }}
                        />
                        <input
                            type="text" className="filter-input" placeholder="Aplicação..."
                            value={filters.app_name} onChange={(e) => handleFilterChange('app_name', e.target.value)}
                            style={{ width: '130px' }}
                        />
                        <input
                            type="text" className="filter-input" placeholder="IP Origem..."
                            value={filters.src_ip} onChange={(e) => handleFilterChange('src_ip', e.target.value)}
                            style={{ width: '130px' }}
                        />
                        <select
                            className="filter-input" style={{ width: '120px' }}
                            value={filters.action} onChange={(e) => handleFilterChange('action', e.target.value)}
                        >
                            <option value="">Todas Ações</option>
                            <option value="blocked">Bloqueado</option>
                            <option value="pass">Permitido</option>
                        </select>
                        <input
                            type="date" className="filter-input"
                            value={filters.start_date} onChange={(e) => handleFilterChange('start_date', e.target.value)}
                            style={{ colorScheme: 'dark', width: '130px' }}
                        />
                        <span style={{ color: '#858796', fontSize: '0.8rem' }}>Até</span>
                        <input
                            type="date" className="filter-input"
                            value={filters.end_date} onChange={(e) => handleFilterChange('end_date', e.target.value)}
                            style={{ colorScheme: 'dark', width: '130px' }}
                        />

                        <div style={{ flexGrow: 1 }}></div>

                        <button className="btn btn-primary btn-sm" style={{ display: 'flex', alignItems: 'center', gap: '5px' }} onClick={() => handleExport('pdf')}>📄 PDF</button>
                        <button className="btn btn-success btn-sm" style={{ display: 'flex', alignItems: 'center', gap: '5px' }} onClick={() => handleExport('csv')}>📊 Excel</button>
                        <button className="btn btn-secondary btn-sm" style={{ display: 'flex', alignItems: 'center', gap: '5px' }} onClick={clearFilters}>🧹 Limpar</button>
                    </div>

                    <div style={{ padding: '0 15px 15px 15px', overflowX: 'auto' }}>
                        <table className="table-premium">
                            <thead>
                                <tr>
                                    <th>Data/Hora</th>
                                    <th>Usuário</th>
                                    <th>Aplicação</th>
                                    <th>Volume (Total)</th>
                                    <th>IP Origem</th>
                                    <th>Ação</th>
                                    <th style={{ textAlign: 'center' }}>Detalhes</th>
                                </tr>
                            </thead>
                            <tbody>
                                {loading && events.length === 0 ? (
                                    <tr><td colSpan="7" style={{ textAlign: 'center', padding: '40px' }}>Carregando dados...</td></tr>
                                ) : events.length === 0 ? (
                                    <tr><td colSpan="7" style={{ textAlign: 'center', padding: '40px' }}>Nenhum evento encontrado.</td></tr>
                                ) : (
                                    events.map((event, index) => (
                                        <tr key={index}>
                                            <td>
                                                <div>{new Date(event.timestamp).toLocaleDateString()}</div>
                                                <div style={{ fontSize: '0.75rem', color: '#858796' }}>{new Date(event.timestamp).toLocaleTimeString()}</div>
                                            </td>
                                            <td>
                                                <div style={{ display: 'flex', alignItems: 'center' }}>
                                                    <div className="user-avatar">{(event.ad_display_name || event.username || 'UK').substring(0, 2).toUpperCase()}</div>
                                                    <div>
                                                        <div style={{ fontWeight: 600, color: 'white' }}>{event.ad_display_name || event.username}</div>
                                                        <div style={{ fontSize: '0.7rem', color: '#5a5c69' }}>
                                                            <span>{event.user_department || 'N/A'}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                            <td>
                                                <div style={{ fontWeight: 600, color: '#f8fafc' }}>{event.app_name || '-'}</div>
                                                <div style={{ fontSize: '0.7rem', color: '#858796' }}>{event.app_category || 'Outros'}</div>
                                            </td>
                                            <td>
                                                <div style={{ color: '#d1d3e2', fontSize: '0.85rem' }}>
                                                    {event.bytes_in || event.bytes_out ? (
                                                        <span>{Math.round(((event.bytes_in || 0) + (event.bytes_out || 0)) / 1024).toLocaleString()} KB</span>
                                                    ) : '-'}
                                                </div>
                                            </td>
                                            <td style={{ color: '#d1d3e2' }}>{event.src_ip}</td>
                                            <td>
                                                <span style={{
                                                    padding: '4px 8px', borderRadius: '4px', fontSize: '0.75rem', fontWeight: 600,
                                                    background: event.action === 'blocked' ? 'rgba(220, 53, 69, 0.2)' : 'rgba(28, 200, 138, 0.2)',
                                                    color: event.action === 'blocked' ? '#dc3545' : '#1cc88a'
                                                }}>
                                                    {event.action || '-'}
                                                </span>
                                            </td>
                                            <td style={{ textAlign: 'center' }}>
                                                <button
                                                    className="btn-sm"
                                                    style={{ background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer', color: '#d1d3e2' }}
                                                    onClick={() => setSelectedEvent(event)}
                                                    title="Ver Detalhes"
                                                >
                                                    👁️
                                                </button>
                                            </td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>

                    <Pagination />
                </div >

                {selectedEvent && <AppControlDetailsModal event={selectedEvent} onClose={() => setSelectedEvent(null)} />
                }
            </div >
        );
    }

    const container = document.getElementById('appcontrol-dashboard-root');
    const root = createRoot(container);
    root.render(<AppControlDashboard />);
    {% endverbatim %}
</script>
{% endblock %}
